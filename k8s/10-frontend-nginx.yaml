apiVersion: apps/v1
kind: Deployment
metadata:
  name: hrmanager-frontend
  namespace: hrmanager
  labels:
    app: hrmanager-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hrmanager-frontend
  template:
    metadata:
      labels:
        app: hrmanager-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: nginx
          # Frontend image from GHCR (should contain built static files + nginx config)
          image: ghcr.io/bunescumihai/front:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: hrmanager-frontend
  namespace: hrmanager
spec:
  type: ClusterIP
  selector:
    app: hrmanager-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80

