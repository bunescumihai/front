name: Build and Push Docker Image to GHCR

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  # github.repository returns username/repository, adjust as needed
  # Based on your k8s config, you're using ghcr.io/bunescumihai/front:latest
  IMAGE_NAME: bunescumihai/front

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --configuration production

      - name: Run tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.ACTIONS_SECRET }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Kubernetes deployment file
        if: github.event_name != 'pull_request'
        run: |
          # Replace 'latest' tag with the short SHA tag generated by Docker metadata action
          sed -i "s|image: ghcr.io/${{ env.IMAGE_NAME }}:latest|image: ghcr.io/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}|g" k8s/10-frontend-nginx.yaml

      - name: Transfer deployment file to AWS server
        if: github.event_name != 'pull_request'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_PEM_KEY }}
          source: "k8s/10-frontend-nginx.yaml"
          target: "~/k8s/"
          strip_components: 1

      - name: Deploy to AWS Sub-Server
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_PEM_KEY }}
          script: |
            # Apply the updated deployment file using kubectl
            sudo kubectl apply -f ~/k8s/10-frontend-nginx.yaml

            # Optional: Wait for the rollout to complete
            # sudo kubectl rollout status deployment/<deployment-name> -n <namespace>
